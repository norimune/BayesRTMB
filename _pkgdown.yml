url: https://norimune.github.io/BayesRTMB/

template:
  bootstrap: 5
  bootswatch: flatly

reference:
  - title: "Model Definition"
    desc: "Functions for defining and building RTMB models."
    contents:
      - rtmb_model
      - safe_rtmb_model
      - rtmb_code
      - parameters_code
      - model_code
      - transform_code
      - Dim

  - title: "Wrapper Functions"
    desc: "Simplified interfaces for common statistical models."
    contents:
      - rtmb_glmer
      - rtmb_glm
      - rtmb_lm
      - rtmb_fa
      - rtmb_irt
      - rtmb_corr
      - rtmb_ttest

  - title: "Fit Objects and Methods"
    desc: "Classes and functions for handling estimation results."
    contents:
      - RTMB_Fit_Base
      - MAP_Fit
      - MCMC_Fit
      - VB_Fit
      - bayes_factor
      - conditional_effects
      - item_info
      - item_curve
      - test_info
      - sort_loadings

  - title: "Plotting Functions"
    desc: "Visualizing posterior samples and model diagnostics."
    contents:
      - plot_dens
      - plot_trace
      - plot_acf
      - plot_forest
      - plot_pairs

  - title: "Utilities"
    contents:
      - read_mcmc_csv
